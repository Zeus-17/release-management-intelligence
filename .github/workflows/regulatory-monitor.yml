# ═══════════════════════════════════════════════════════════════════
# REGULATORY CONTENT MONITOR
# James Holford — Intelligence Tools Suite
# ───────────────────────────────────────────────────────────────────
# Runs every Monday at 08:00 UTC. No human intervention required.
# Updates this tool's content JSON automatically when relevant
# regulatory publications are detected from confirmed official sources.
#
# CONFIRMED SOURCES (verified June 2026):
#   EBA RSS    — eba.europa.eu/news-press/news/rss.xml
#                Official EBA published feed. EU DORA and operational
#                resilience publications. Confirmed working.
#
#   GOV.UK API — www.gov.uk/api/search.json
#                Official UK Government Search API (GDS). Free, no auth.
#                Used for FCA and ICO publications indexed on GOV.UK.
#                Docs: docs.publishing.service.gov.uk/repos/search-api
#
# TO ADD A NEW TOOL:
#   Copy this file to the new tool's repo at .github/workflows/
#   Change CONTENT_FILE to the new tool's content JSON filename.
#   That is all.
#
# DESIGN PRINCIPLE:
#   Each tool's repo contains its own copy of this workflow.
#   Each workflow updates only its own content file using the built-in
#   GITHUB_TOKEN — no cross-repo dependencies, no stored secrets needed.
#   Tools update independently. Users benefit whether they have one tool
#   or several.
# ═══════════════════════════════════════════════════════════════════

name: Regulatory Content Monitor

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

env:
  # ── CHANGE THIS LINE ONLY when deploying to a new tool repo ──
  CONTENT_FILE: rm-content-v1.json
  # ─────────────────────────────────────────────────────────────

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check regulatory sources
        run: |
          node - <<'SCRIPT'
          const fs   = require('fs');
          const https = require('https');

          // ── HTTP helper with redirect following ──────────────────
          function get(url, redirects = 5) {
            return new Promise((resolve, reject) => {
              if (redirects === 0) return reject(new Error('Too many redirects'));
              https.get(url, { headers: { 'User-Agent': 'regulatory-monitor/2.0 (open-source tool)' } }, res => {
                if (res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  res.resume();
                  return get(res.headers.location, redirects - 1).then(resolve).catch(reject);
                }
                if (res.statusCode !== 200) {
                  res.resume();
                  return reject(new Error(`HTTP ${res.statusCode}`));
                }
                const chunks = [];
                res.on('data', c => chunks.push(c));
                res.on('end', () => resolve(Buffer.concat(chunks).toString('utf8')));
              }).on('error', reject);
            });
          }

          // ── Date helpers ─────────────────────────────────────────
          const today      = new Date().toISOString().slice(0, 10);
          const cutoff     = new Date();
          cutoff.setDate(cutoff.getDate() - 14);

          function isRecent(dateStr) {
            if (!dateStr) return true; // no date = include
            const d = new Date(dateStr);
            return !isNaN(d) && d >= cutoff;
          }

          // ── Confirmed official sources ───────────────────────────
          const SOURCES = [
            {
              id:   'eba_dora',
              name: 'EBA — EU DORA and operational resilience',
              type: 'rss',
              url:  'https://www.eba.europa.eu/news-press/news/rss.xml',
              keywords: [
                'dora', 'digital operational resilience', 'ict',
                'incident reporting', 'rts', 'its', 'technical standard',
                'third-party', 'operational resilience'
              ],
              authority:     'https://eur-lex.europa.eu/eli/reg/2022/2554/oj',
              authorityName: 'EU DORA — Digital Operational Resilience Act (EUR-Lex Official Journal)',
              appliesto:     'eu_dora'
            },
            {
              id:   'fca_ops',
              name: 'FCA — operational resilience and incident notification',
              type: 'govuk',
              url:  'https://www.gov.uk/api/search.json' +
                    '?filter_organisations[]=financial-conduct-authority' +
                    '&q=operational+resilience+incident+notification+SUP' +
                    '&order=-public_timestamp&count=10',
              keywords: [
                'operational resilience', 'sup 15', 'notification',
                'incident', 'important business service', 'dora',
                'critical third', 'outsourcing'
              ],
              authority:     'https://www.fca.org.uk/firms/operational-resilience',
              authorityName: 'FCA — Operational Resilience guidance',
              appliesto:     'fca'
            },
            {
              id:   'ico_gdpr',
              name: 'ICO — data breach notification and GDPR',
              type: 'govuk',
              url:  'https://www.gov.uk/api/search.json' +
                    '?filter_organisations=information-commissioners-office' +
                    '&q=breach+notification+GDPR+data+protection+reporting' +
                    '&order=-public_timestamp&count=10',
              keywords: [
                'breach', 'notification', 'gdpr', 'data protection',
                'personal data', '72 hour', 'ico guidance', 'reporting'
              ],
              authority:     'https://ico.org.uk/for-organisations/report-a-breach/',
              authorityName: 'ICO — Report a personal data breach',
              appliesto:     'ico'
            }
          ];

          // ── Parse RSS ─────────────────────────────────────────────
          function parseRSS(body, keywords) {
            const items = body.match(/<(item|entry)[\s\S]*?<\/(item|entry)>/gi) || [];
            const found = [];
            for (const item of items) {
              const dateM  = item.match(/<(pubDate|updated|published)>(.*?)<\/(pubDate|updated|published)>/i);
              const dateStr = dateM ? dateM[2] : null;
              if (!isRecent(dateStr)) continue;
              const titleM = item.match(/<title[^>]*>(?:<!\[CDATA\[)?(.*?)(?:\]\]>)?<\/title>/i);
              const descM  = item.match(/<(description|summary)[^>]*>(?:<!\[CDATA\[)?([\s\S]*?)(?:\]\]>)?<\/(description|summary)>/i);
              const text   = [titleM?.[1] || '', descM?.[2] || '']
                              .join(' ').replace(/<[^>]+>/g, '').toLowerCase();
              if (!keywords.some(kw => text.includes(kw))) continue;
              const linkM  = item.match(/<link>(.*?)<\/link>/i) || item.match(/<link[^>]+href="([^"]+)"/i);
              found.push({
                title: (titleM?.[1] || 'New publication').replace(/<!\[CDATA\[|\]\]>|<[^>]+>/g, '').trim(),
                link:  linkM?.[1]?.trim() || ''
              });
            }
            return found;
          }

          // ── Parse GOV.UK API JSON ─────────────────────────────────
          function parseGovUK(body, keywords) {
            let data;
            try { data = JSON.parse(body); } catch(e) { return []; }
            const results = data.results || [];
            const found   = [];
            for (const r of results) {
              if (!isRecent(r.public_timestamp)) continue;
              const text = [r.title || '', r.description || ''].join(' ').toLowerCase();
              if (!keywords.some(kw => text.includes(kw))) continue;
              found.push({
                title: r.title || 'New publication',
                link:  r.link ? 'https://www.gov.uk' + r.link : ''
              });
            }
            return found;
          }

          // ── Parse HTML (ICO media centre — no RSS available) ────────
          function parseHTML(body, keywords) {
            const found = [];
            // Extract article/link titles from HTML
            const titleMatches = body.match(/<h[23][^>]*>(.*?)<\/h[23]>/gi) || [];
            for (const match of titleMatches.slice(0, 30)) {
              const text = match.replace(/<[^>]+>/g, '').trim().toLowerCase();
              if (keywords.some(kw => text.includes(kw))) {
                found.push({ title: match.replace(/<[^>]+>/g, '').trim(), link: '' });
              }
            }
            return found;
          }

          // ── Main ──────────────────────────────────────────────────
          (async () => {
            const contentFile = process.env.CONTENT_FILE || 'content.json';
            let content = {};
            try {
              content = JSON.parse(fs.readFileSync(contentFile, 'utf8'));
            } catch(e) {
              console.error(`Cannot read ${contentFile}:`, e.message);
              process.exit(1);
            }

            const notices = [];
            const errors  = [];

            for (const src of SOURCES) {
              try {
                console.log(`Checking: ${src.name}`);
                const body  = await get(src.url);
                const found = src.type === 'rss'
                  ? parseRSS(body, src.keywords)
                  : parseGovUK(body, src.keywords);

                console.log(`  Items parsed. Relevant in last 14 days: ${found.length}`);

                if (found.length > 0) {
                  found.slice(0, 2).forEach(f => console.log(`  > ${f.title}`));
                  const expire = new Date();
                  expire.setDate(expire.getDate() + 90);
                  notices.push({
                    id:            `${src.id}_${today.replace(/-/g, '')}`,
                    type:          'info',
                    title:         `${src.name} — new publication detected`,
                    text:          `${found[0].title}. Review for relevance to your ` +
                                   `${src.appliesto === 'eu_dora' ? 'EU DORA' : src.appliesto.toUpperCase()} ` +
                                   `obligations. Always verify at the authoritative source.`,
                    authority:     src.authority,
                    authorityName: src.authorityName,
                    detected:      today,
                    applies_to:    [src.appliesto],
                    expires:       expire.toISOString().slice(0, 10)
                  });
                }
              } catch(e) {
                // Non-fatal: log and continue — one broken source should not fail the job
                console.warn(`  Source error (${src.name}): ${e.message}`);
                errors.push(`${src.id}: ${e.message}`);
              }
            }

            // Update meta
            content.meta = content.meta || {};
            content.meta.last_checked_at    = today;
            content.meta.last_check_result  = errors.length === SOURCES.length
              ? 'all_sources_failed'
              : notices.length > 0 ? 'notices_found' : 'clear';
            if (errors.length)   content.meta.last_check_errors = errors;
            else                 delete content.meta.last_check_errors;

            // Merge notices — remove stale entries for same source prefix, add new ones
            let warnings = content.content_warnings || [];
            for (const notice of notices) {
              const prefix = notice.id.split('_').slice(0, -1).join('_') + '_';
              warnings = warnings.filter(w => !w.id || !w.id.startsWith(prefix));
              warnings.push(notice);
            }
            content.content_warnings = warnings;

            fs.writeFileSync(contentFile, JSON.stringify(content, null, 2) + '\n');
            console.log(`\nDone. Notices: ${notices.length}, Errors: ${errors.length}, File: ${contentFile}`);

            // Fail the job only if ALL sources errored — partial errors are logged but non-fatal
            if (errors.length === SOURCES.length) {
              console.error('All sources failed. Check source URLs.');
              process.exit(1);
            }
          })();
          SCRIPT

      - name: Commit if content changed
        run: |
          git config user.name  "Regulatory Content Monitor"
          git config user.email "actions@github.com"
          git add "${{ env.CONTENT_FILE }}"
          if git diff --cached --quiet; then
            echo "No content changes — all clear."
          else
            git commit -m "chore(content): regulatory monitor — $(date +%Y-%m-%d)

          Sources checked: EBA RSS, GOV.UK FCA API, GOV.UK ICO API.
          Any new notices added to ${{ env.CONTENT_FILE }}.
          Content is informational — users directed to verify at source.

          [skip ci]"
            git push
            echo "Content file updated and deployed."
          fi
